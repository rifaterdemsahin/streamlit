<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamlit — Quantitative Analysis PoC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e1117;
      --surface: #1a1d27;
      --border: #2d3147;
      --accent: #ff4b4b;
      --text: #fafafa;
      --muted: #a3a8c3;
      --debug-bg: #12141f;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Debug Nav (Menu 1) */
    #debug-nav {
      display: none;
      background: var(--debug-bg);
      border-bottom: 2px solid var(--accent);
      padding: 6px 16px;
      overflow-x: auto;
      white-space: nowrap;
    }
    #debug-nav.visible { display: block; }
    #debug-nav a {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      margin-right: 4px;
      border: 1px solid var(--accent);
      transition: background 0.2s;
    }
    #debug-nav a:hover { background: var(--accent); color: #fff; }

    /* Main Header */
    header {
      background: var(--surface);
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 { font-size: 1.05rem; font-weight: 700; color: var(--accent); }
    .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .social-links a {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      margin-left: 8px;
      transition: color 0.2s;
    }
    .social-links a:hover { color: var(--text); }

    #debug-toggle-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #debug-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
    #debug-toggle-btn.active { border-color: var(--accent); color: var(--accent); }

    /* Content Nav (Menu 2) */
    #content-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      position: relative;
    }
    #content-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 8px 10px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    #content-nav a:hover, #content-nav a.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* Search */
    .search-wrapper { margin-left: auto; position: relative; display: flex; align-items: center; }
    #search-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.8rem;
      padding: 5px 10px;
      border-radius: 20px;
      width: 180px;
      outline: none;
      transition: border-color 0.2s, width 0.3s;
    }
    #search-input:focus { border-color: var(--accent); width: 240px; }
    #search-input::placeholder { color: var(--muted); }
    #search-suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-width: 240px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    #search-suggestions.open { display: block; }
    #search-suggestions a {
      display: block;
      color: var(--text);
      text-decoration: none;
      padding: 8px 14px;
      font-size: 0.82rem;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    #search-suggestions a:last-child { border-bottom: none; }
    #search-suggestions a:hover { background: var(--bg); }

    /* Carousel */
    #carousel-section { background: var(--surface); padding: 20px; border-bottom: 1px solid var(--border); }
    #carousel-section h2 { font-size: 0.9rem; color: var(--muted); margin-bottom: 12px; }
    .carousel { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .carousel img { height: 140px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s, border-color 0.2s; flex-shrink: 0; }
    .carousel img:hover { transform: scale(1.03); border-color: var(--accent); }

    /* Stage Grid */
    #stages-section { padding: 24px 20px; }
    #stages-section h2 { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; }
    .stages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .stage-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.2s;
      display: block;
    }
    .stage-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stage-card .emoji { font-size: 1.6rem; display: block; margin-bottom: 8px; }
    .stage-card .title { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
    .stage-card .sub { font-size: 0.75rem; color: var(--muted); }

    /* App Frame */
    #app-frame-wrapper { padding: 0 20px 20px; }
    #app-frame-wrapper h2 { font-size: 0.9rem; color: var(--muted); margin: 20px 0 10px; }
    #app-frame { width: 100%; min-height: 500px; border: 1px solid var(--border); border-radius: 8px; }

    /* Footer */
    footer { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; text-align: center; font-size: 0.75rem; color: var(--muted); }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 600px) {
      header h1 { font-size: 0.9rem; }
      .stages-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      #search-input { width: 130px; }
      #search-input:focus { width: 160px; }
    }
  </style>
</head>
<body>

  <!-- Menu 1: Debug Nav -->
  <nav id="debug-nav" role="navigation" aria-label="Debug navigation"></nav>

  <header>
    <div class="header-top">
      <h1>📈 Streamlit — Quantitative Analysis PoC</h1>
      <div class="header-actions">
        <div class="social-links">
          <a href="https://github.com/rifaterdemsahin/streamlit" target="_blank" rel="noopener">🐙 GitHub</a>
          <a href="https://www.linkedin.com/in/rifaterdemsahin/" target="_blank" rel="noopener">🔗 LinkedIn</a>
          <a href="https://www.youtube.com/@RifatErdemSahin" target="_blank" rel="noopener">📺 YouTube</a>
        </div>
        <button id="debug-toggle-btn" title="Toggle debug navigation">🐞 Debug</button>
      </div>
    </div>
  </header>

  <!-- Menu 2: Content Nav -->
  <nav id="content-nav" role="navigation" aria-label="Content navigation">
    <div class="search-wrapper">
      <input id="search-input" type="search" placeholder="🔍 Search pages…" autocomplete="off" aria-label="Search pages" />
      <div id="search-suggestions" role="listbox"></div>
    </div>
  </nav>

  <section id="carousel-section">
    <h2>🖼 Simulation — Visual Assets</h2>
    <div class="carousel" id="carousel"></div>
  </section>

  <section id="stages-section">
    <h2>🗺 Journey: Unknown → Proven</h2>
    <div class="stages-grid" id="stages-grid"></div>
  </section>

  <div id="app-frame-wrapper">
    <h2>🚀 Live App</h2>
    <iframe
      id="app-frame"
      src="__FLY_APP_URL__"
      title="Streamlit Quantitative Analysis Application"
      allow="fullscreen"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      referrerpolicy="no-referrer"
    ></iframe>
  </div>

  <footer>
    <p>
      <a href="https://github.com/rifaterdemsahin/streamlit" target="_blank" rel="noopener">rifaterdemsahin/streamlit</a>
      &nbsp;·&nbsp;
      <a href="https://www.linkedin.com/in/rifaterdemsahin/" target="_blank" rel="noopener">LinkedIn</a>
      &nbsp;·&nbsp;
      <a href="https://www.youtube.com/@RifatErdemSahin" target="_blank" rel="noopener">YouTube @RifatErdemSahin</a>
    </p>
  </footer>

  <script>
    function getCookie(name) {
      var m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
      return m ? decodeURIComponent(m[1]) : null;
    }
    function setCookie(name, value, days) {
      var exp = new Date(Date.now() + days * 864e5).toUTCString();
      document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + exp + '; path=/; SameSite=Lax';
    }

    var searchIndex = [];
    var debugNav = document.getElementById('debug-nav');
    var debugBtn = document.getElementById('debug-toggle-btn');
    var searchInput = document.getElementById('search-input');
    var suggestions = document.getElementById('search-suggestions');

    fetch('nav.json')
      .then(function(r) { return r.json(); })
      .then(function(nav) {
        buildDebugMenu(nav.debug_menu);
        buildContentMenu(nav.content_menu);
        nav.debug_menu.forEach(function(i) {
          searchIndex.push({ label: i.label, emoji: i.emoji, href: 'markdown_renderer.html?file=' + encodeURIComponent(i.path) });
        });
        nav.content_menu.forEach(function(i) {
          searchIndex.push({ label: i.label, emoji: i.emoji, href: i.href });
        });
      })
      .catch(function() {})
      .finally(function() {
        buildCarousel();
        buildStageCards();
        applyDebugState();
      });

    function buildDebugMenu(items) {
      items.forEach(function(item) {
        var a = document.createElement('a');
        a.href = 'markdown_renderer.html?file=' + encodeURIComponent(item.path);
        a.textContent = item.emoji + ' ' + item.label;
        debugNav.appendChild(a);
      });
    }

    function buildContentMenu(items) {
      var nav = document.getElementById('content-nav');
      var sw = nav.querySelector('.search-wrapper');
      items.forEach(function(item) {
        var a = document.createElement('a');
        a.href = item.href;
        a.textContent = item.emoji + ' ' + item.label;
        nav.insertBefore(a, sw);
      });
    }

    function applyDebugState() {
      var params = new URLSearchParams(window.location.search);
      var isDebug = getCookie('debug') === 'true' || params.get('debug') === 'true';
      if (isDebug) {
        debugNav.classList.add('visible');
        debugBtn.classList.add('active');
        debugBtn.textContent = '🐞 Debug ✓';
      } else {
        debugNav.classList.remove('visible');
        debugBtn.classList.remove('active');
        debugBtn.textContent = '🐞 Debug';
      }
    }

    debugBtn.addEventListener('click', function() {
      var current = getCookie('debug') === 'true';
      setCookie('debug', String(!current), 365);
      applyDebugState();
    });

    searchInput.addEventListener('input', function() {
      var q = searchInput.value.trim().toLowerCase();
      suggestions.innerHTML = '';
      if (!q) { suggestions.classList.remove('open'); return; }
      var matches = searchIndex.filter(function(i) { return i.label.toLowerCase().includes(q); });
      if (!matches.length) { suggestions.classList.remove('open'); return; }
      matches.slice(0, 8).forEach(function(item) {
        var a = document.createElement('a');
        a.href = item.href;
        a.textContent = item.emoji + ' ' + item.label;
        suggestions.appendChild(a);
      });
      suggestions.classList.add('open');
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.search-wrapper')) suggestions.classList.remove('open');
    });

    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { suggestions.classList.remove('open'); searchInput.blur(); }
    });

    var carouselImages = ['3_Simulation/WhatsApp Image 2026-03-09 at 13.10.21.jpeg'];

    function buildCarousel() {
      var container = document.getElementById('carousel');
      if (!carouselImages.length) { document.getElementById('carousel-section').style.display = 'none'; return; }
      carouselImages.forEach(function(src) {
        var img = document.createElement('img');
        img.src = src;
        img.alt = 'Simulation image';
        img.loading = 'lazy';
        img.onerror = function() { if (this.parentNode) this.parentNode.removeChild(this); };
        container.appendChild(img);
      });
    }

    var stages = [
      { emoji: '❓', title: '1. Real Unknown',  sub: 'The "Why" — OKRs & Problems', path: '1_Real_Unknown/README.md' },
      { emoji: '🌍', title: '2. Environment',   sub: 'The "Context" — Setup & Config', path: '2_Environment/README.md' },
      { emoji: '🎨', title: '3. Simulation',    sub: 'The "Vision" — Mockups & UI', path: '3_Simulation/README.md' },
      { emoji: '🔬', title: '4. Formula',       sub: 'The "Recipe" — Architecture', path: '4_Formula/README.md' },
      { emoji: '💻', title: '5. Symbols',       sub: 'The "Reality" — Source Code', path: '5_Symbols/README.md' },
      { emoji: '🐛', title: '6. Semblance',     sub: 'The "Scars" — Errors & Fixes', path: '6_Semblance/README.md' },
      { emoji: '🧪', title: '7. Testing Known', sub: 'The "Proof" — Validation', path: '7_Testing_Known/README.md' }
    ];

    function buildStageCards() {
      var grid = document.getElementById('stages-grid');
      stages.forEach(function(s) {
        var a = document.createElement('a');
        a.className = 'stage-card';
        a.href = 'markdown_renderer.html?file=' + encodeURIComponent(s.path);
        a.innerHTML = '<span class="emoji">' + s.emoji + '</span><span class="title">' + s.title + '</span><span class="sub">' + s.sub + '</span>';
        grid.appendChild(a);
      });
    }
  </script>
</body>
</html>
