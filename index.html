<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamlit — Quantitative Analysis PoC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0e1117;
      color: #fafafa;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2d3147;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ff4b4b;
    }

    header a {
      font-size: 0.85rem;
      color: #a3a8c3;
      text-decoration: none;
    }

    header a:hover { color: #fafafa; }

    #app-frame {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>📈 Streamlit — Quantitative Analysis PoC</h1>
    <a href="https://github.com/rifaterdemsahin/streamlit" target="_blank" rel="noopener">View on GitHub ↗</a>
  </header>
  <iframe
    id="app-frame"
    src="__FLY_APP_URL__"
    title="Streamlit Quantitative Analysis Application"
    allow="fullscreen"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    referrerpolicy="no-referrer"
  ></iframe>
</body>
</html>
